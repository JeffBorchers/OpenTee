<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Create your OpenTee account - Start monitoring tee times">
  <title>Sign Up - OpenTee</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#1a3a2a">
  <style>
    .auth-page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      background: linear-gradient(135deg, #1a3a2a 0%, #0f2419 50%, #1a3a2a 100%);
    }
    
    .auth-container {
      width: 100%;
      max-width: 420px;
    }
    
    .auth-logo {
      text-align: center;
      margin-bottom: 40px;
    }
    
    .auth-logo img {
      max-width: 140px;
      border-radius: 12px;
    }
    
    .auth-card {
      background: rgba(45, 90, 63, 0.2);
      border: 1px solid rgba(197, 165, 90, 0.2);
      border-radius: 16px;
      padding: 40px 32px;
      backdrop-filter: blur(10px);
    }
    
    .auth-title {
      font-size: 28px;
      font-weight: 800;
      text-align: center;
      margin-bottom: 8px;
    }
    
    .auth-subtitle {
      color: rgba(255, 255, 255, 0.6);
      text-align: center;
      margin-bottom: 32px;
      font-size: 15px;
    }
    
    .form-field {
      margin-bottom: 20px;
    }
    
    .form-field label {
      display: block;
      font-size: 14px;
      font-weight: 500;
      margin-bottom: 8px;
      color: rgba(255, 255, 255, 0.8);
    }
    
    .form-field input {
      width: 100%;
      padding: 14px 16px;
      font-size: 16px;
      font-family: inherit;
      background: rgba(0, 0, 0, 0.2);
      border: 1px solid rgba(197, 165, 90, 0.2);
      border-radius: 8px;
      color: #fff;
      outline: none;
      transition: all 0.2s ease;
    }
    
    .form-field input:focus {
      border-color: #C5A55A;
      box-shadow: 0 0 0 3px rgba(197, 165, 90, 0.1);
    }
    
    .form-field input::placeholder {
      color: rgba(255, 255, 255, 0.4);
    }
    
    .form-field input.error {
      border-color: #f87171;
    }
    
    .field-error {
      color: #f87171;
      font-size: 12px;
      margin-top: 6px;
    }
    
    .form-error {
      background: rgba(248, 113, 113, 0.1);
      border: 1px solid rgba(248, 113, 113, 0.2);
      color: #f87171;
      padding: 14px;
      margin-bottom: 20px;
      border-radius: 8px;
      font-size: 14px;
    }
    
    .auth-links {
      text-align: center;
      margin-top: 24px;
    }
    
    .auth-links a {
      color: #C5A55A;
      text-decoration: none;
      font-size: 14px;
      transition: color 0.2s ease;
    }
    
    .auth-links a:hover {
      color: #D4B875;
    }
    
    .auth-divider {
      display: flex;
      align-items: center;
      margin: 24px 0;
      color: rgba(255, 255, 255, 0.4);
      font-size: 13px;
    }
    
    .auth-divider::before,
    .auth-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: rgba(197, 165, 90, 0.2);
    }
    
    .auth-divider span {
      padding: 0 16px;
    }
    
    .password-hint {
      color: rgba(255, 255, 255, 0.4);
      font-size: 12px;
      margin-top: 6px;
    }
    
    .btn-loading {
      opacity: 0.7;
      pointer-events: none;
    }
    
    .btn-loading::after {
      content: '';
      display: inline-block;
      width: 16px;
      height: 16px;
      margin-left: 10px;
      border: 2px solid transparent;
      border-top-color: currentColor;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    @media (max-width: 480px) {
      .auth-card {
        padding: 32px 24px;
      }
      
      .auth-title {
        font-size: 24px;
      }
    }
  </style>
</head>
<body>
  <div class="auth-page">
    <div class="auth-container">
      <div class="auth-logo">
        <a href="/">
          <img src="/logos/opentee-final-logo.jpg" alt="OpenTee">
        </a>
      </div>
      
      <div class="auth-card">
        <h1 class="auth-title">Create Account</h1>
        <p class="auth-subtitle">Start monitoring tee times in minutes</p>
        
        <div id="error-message" class="form-error" style="display: none;"></div>
        
        <form id="register-form">
          <div class="form-field">
            <label for="name">Full Name</label>
            <input type="text" id="name" name="name" placeholder="John Doe" required autocomplete="name">
          </div>
          
          <div class="form-field">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" placeholder="you@example.com" required autocomplete="email">
          </div>
          
          <div class="form-field">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" placeholder="Create a password" required autocomplete="new-password">
            <p class="password-hint">At least 6 characters</p>
          </div>
          
          <div class="form-field">
            <label for="confirmPassword">Confirm Password</label>
            <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Confirm your password" required autocomplete="new-password">
            <p id="password-match-error" class="field-error" style="display: none;">Passwords do not match</p>
          </div>
          
          <button type="submit" class="btn btn-primary btn-block" id="submit-btn">
            Create Account
          </button>
        </form>
        
        <div class="auth-divider">
          <span>or</span>
        </div>
        
        <div class="auth-links">
          <p>Already have an account? <a href="/login.html">Log in</a></p>
        </div>
      </div>
    </div>
  </div>

  <script>
    const form = document.getElementById('register-form');
    const submitBtn = document.getElementById('submit-btn');
    const errorDiv = document.getElementById('error-message');
    const passwordMatchError = document.getElementById('password-match-error');
    const confirmPassword = document.getElementById('confirmPassword');
    const password = document.getElementById('password');
    
    // Check password match on input
    confirmPassword.addEventListener('input', () => {
      if (confirmPassword.value && confirmPassword.value !== password.value) {
        passwordMatchError.style.display = 'block';
        confirmPassword.classList.add('error');
      } else {
        passwordMatchError.style.display = 'none';
        confirmPassword.classList.remove('error');
      }
    });
    
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const name = document.getElementById('name').value.trim();
      const email = document.getElementById('email').value.trim();
      const pwd = password.value;
      const confirmPwd = confirmPassword.value;
      
      // Validate passwords match
      if (pwd !== confirmPwd) {
        passwordMatchError.style.display = 'block';
        confirmPassword.classList.add('error');
        return;
      }
      
      // Reset state
      errorDiv.style.display = 'none';
      submitBtn.classList.add('btn-loading');
      submitBtn.disabled = true;
      
      try {
        const response = await fetch('/api/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, email, password: pwd })
        });
        
        const data = await response.json();
        
        if (response.ok && data.success) {
          // Store token and redirect
          localStorage.setItem('opentee_token', data.token);
          localStorage.setItem('opentee_user', JSON.stringify(data.user));
          window.location.href = '/app.html';
        } else {
          errorDiv.textContent = data.error || 'Registration failed. Please try again.';
          errorDiv.style.display = 'block';
        }
      } catch (err) {
        errorDiv.textContent = 'Connection error. Please check your network and try again.';
        errorDiv.style.display = 'block';
      } finally {
        submitBtn.classList.remove('btn-loading');
        submitBtn.disabled = false;
      }
    });
    
    // Check if already logged in
    const token = localStorage.getItem('opentee_token');
    if (token) {
      fetch('/api/auth/me', {
        headers: { 'Authorization': `Bearer ${token}` }
      })
      .then(res => res.ok ? window.location.href = '/app.html' : null)
      .catch(() => {});
    }
  </script>
</body>
</html>
